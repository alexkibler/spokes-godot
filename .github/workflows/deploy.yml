name: "Build and Push Docker Image"
on:
  push:
    branches:
      - '**'

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0

      - name: Import Assets
        run: godot --headless --import --path .

      - name: Run GUT Tests
        run: godot --headless --path . -s addons/gut/gut_cmdln.gd -gdir=res://tests -ginclude_subdirs -gexit -gprefix=test_ -gsuffix=.gd

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.3.0

      - name: Run Procedural Audit
        run: godot --headless --path . -s addons/gut/gut_cmdln.gd -gtest=res://tests/test_audit.gd -gexit

      - name: Commit Updated Audit
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ALGORITHMS_OVERVIEW.md
          git commit -m "docs: update procedural algorithms overview [skip ci]" || echo "No changes to commit"
          git push || echo "No changes to push"

      - name: Inject Commit Hash
        run: |
          sed -i 's/const COMMIT_HASH: String = "dev"/const COMMIT_HASH: String = "${{ github.sha }}"/' src/autoloads/BuildInfo.gd

      - name: Web Export
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          use_preset_export_path: true
          export_debug: false

      - name: Log in to GHCR
        uses: docker/login-action@v3
        continue-on-error: true
        id: login
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retry Log in to GHCR
        if: steps.login.outcome == 'failure'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name == 'main' && 'main' || 'dev' }}
            ghcr.io/${{ github.repository }}:${{ github.ref_name == 'main' && 'latest' || 'dev-latest' }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}
