name: "Pull Request Build Validation"
on:
  pull_request:
    branches:
      - main

jobs:
  validate-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Run GUT Tests
        uses: ceceppa/godot-gut-ci@main
        with:
          godot_version: '4.3'
          import_project: true
          gut_params: "-gdir=res://tests -ginclude_subdirs -gexit"

      - name: Web Export
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          use_preset_export_path: true
          export_debug: true # Debug export for PR validation

      - name: Build Docker Image (No Push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
